version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scout_demo
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  express-v4:
    build:
      context: ./express-v4
    ports:
      - "3000:3000"
    environment:
      SCOUT_CORE_AGENT_DOWNLOAD: "false"
      SCOUT_CORE_AGENT_LAUNCH: "false"
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: scout_demo
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 5s
      timeout: 3s
      retries: 5

  express-v5:
    build:
      context: ./express-v5
    ports:
      - "3001:3001"
    environment:
      SCOUT_CORE_AGENT_DOWNLOAD: "false"
      SCOUT_CORE_AGENT_LAUNCH: "false"
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: scout_demo
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 5s
      timeout: 3s
      retries: 5
